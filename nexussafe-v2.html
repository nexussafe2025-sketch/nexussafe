<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnpAoGhdBDgf-fKPAVcliwMqkCDIsz2Jc",
  authDomain: "nexussafe-b50c1.firebaseapp.com",
  projectId: "nexussafe-b50c1",
  storageBucket: "nexussafe-b50c1.firebasestorage.app",
  messagingSenderId: "526590304729",
  appId: "1:526590304729:web:e03dbf7823ff12609c39c8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "nexussafe", "clientes");

window._fbGuardar = async (data) => {
  try {
    await setDoc(DOC_REF, { lista: data });
  } catch(e) {
    console.error("Error guardando en Firebase:", e);
  }
};

window._fbCargar = async () => {
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) {
      return snap.data().lista || [];
    }
    return [];
  } catch(e) {
    console.error("Error cargando de Firebase:", e);
    return [];
  }
};

window._fbEscuchar = (callback) => {
  return onSnapshot(DOC_REF, (snap) => {
    if (snap.exists()) {
      callback(snap.data().lista || []);
    }
  });
};

window._firebaseReady = true;
window.dispatchEvent(new Event('firebaseReady'));
</script>
